<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Rincón del Vinilo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <div id="app" class="container py-5">
      <h1 class="text-center mb-5">{{ titulo }}</h1>

      <div class="row mb-4 justify-content-center">
        <div class="col-md-5 mb-3 mb-md-0">
          <input
            type="text"
            v-model="busqueda"
            class="form-control form-control-lg shadow-sm"
            placeholder="Buscar por álbum o artista..."
          />
        </div>
        <div class="col-md-3">
          <select
            v-model="categoria"
            class="form-select form-select-lg shadow-sm"
          >
            <option value="todos">Todos los géneros</option>
            <option value="jazz">Jazz</option>
            <option value="rock">Rock</option>
            <option value="blues">Blues</option>
          </select>
        </div>
      </div>

      <div v-if="cargando" class="text-center my-5">
        <div class="spinner-border text-dark" role="status"></div>
        <p class="mt-2">Cargando catálogo...</p>
      </div>

      <div
        v-else-if="error"
        class="alert alert-danger text-center shadow-sm mx-auto"
        style="max-width: 500px"
      >
        {{ error }}
        <br />
        <button class="btn btn-outline-danger mt-3" @click="cargarDiscos">
          Reintentar
        </button>
      </div>

      <div
        v-else-if="discosFiltrados.length === 0"
        class="alert alert-info text-center shadow-sm mx-auto"
        style="max-width: 500px"
      >
        No se encontraron discos que coincidan con tu búsqueda.
      </div>

      <div v-else class="row g-4">
        <div
          v-for="disco in discosFiltrados"
          :key="disco.id"
          class="col-12 col-md-6 col-lg-4"
        >
          <div class="card h-100 shadow-sm border-0">
            <img
              :src="disco.imagen"
              :alt="disco.album"
              class="card-img-top"
              style="object-fit: cover; aspect-ratio: 1/1"
            />
            <div class="card-body d-flex flex-column">
              <h5 class="card-title fw-bold">{{ disco.album }}</h5>
              <p class="card-text text-muted mb-2">{{ disco.artista }}</p>
              <div>
                <span class="badge bg-secondary mb-3"
                  >{{ disco.genero.toUpperCase() }}</span
                >
              </div>
              <p class="mt-auto fs-4 fw-bold mb-0">
                ${{ disco.precio.toLocaleString('es-CL') }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
